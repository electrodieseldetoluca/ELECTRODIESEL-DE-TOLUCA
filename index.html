    <style>
        /* --- CONFIGURACIÓN GENERAL --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            cursor: default;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            height: 130vh;
            width: 100%;
            overflow: auto; /* Evita scroll si no es necesario */
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            position: relative;
        }

        /* --- VIDEO DE FONDO --- */
        #bg-video {
            position: fixed;
            right: 0;
            bottom: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            object-fit: cover;
            filter: brightness(0.8); /* Oscurece un poco el video para que el texto resalte */
        }

        /* --- CONTENEDOR PRINCIPAL (GLASSMORPHISM) --- */
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px); /* Efecto borroso */
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px 30px;
            width: 90%;
            max-width: 550px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            animation: slideUp 1s ease-out;
        }

        .header{
            display: flex;
            text-align: left;
            gap: 20px;
            margin-bottom: 20px;
        }

        /* --- TEXTOS Y TÍTULOS --- */
        h1 {
            font-weight: 900;
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
            margin-top: 10px;
            /* Gradiente de texto Azul a Verde */
            background: linear-gradient(90deg, #00c6ff, #0072ff, #28a745);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: shine 3s linear infinite;
        }

        .logo:hover{
            transform: scale(1.05);
            transition: all .25s ease;
        }

        .tagline {
            font-size: 0.9rem;
            font-weight: 300;
            color: #e0e0e0;
            font-style: italic;
        }

        /* --- SECCIÓN DE SERVICIOS (BADGES) --- */
        .services-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .service-badge {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(40, 167, 69, 0.5);
            padding: 5px 10px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #fff;
            transition: all 0.3s ease;
        }

        .service-badge:hover {
            background: rgba(40, 167, 69, 0.8);
            transform: scale(1.05);
        }

        /* --- BOTONES --- */
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            text-decoration: none;
            position: relative;
            padding: 15px 20px;
            border-radius: 50px;
            font-weight: 700;
            color: white;
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.2);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Efecto rebote */
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            overflow: hidden;
            font-size: 1.1rem;
            cursor: pointer;
        }

        /* Capa de fondo animada para el botón */
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #0052D4, #4364F7, #6FB1FC); /* Azul degradado */
            transition: left 0.4s ease;
            z-index: -1;
        }

        /* Variaciones de color por botón para un look más pro */
        .btn:nth-child(1)::before { background: linear-gradient(45deg, #1877F2, #3b5998); } /* FB */
        .btn:nth-child(2)::before { background: linear-gradient(45deg, #000000, #25F4EE, #FE2C55); } /* TikTok */
        .btn:nth-child(3)::before { background: linear-gradient(45deg,rgba(255, 174, 0, 1) 0%, rgba(255, 230, 0, 1) 100%); } /* Mercado Libre */
        .btn:nth-child(4)::before { background: linear-gradient(45deg, #0052D4, #65C7F7, #9CECFB); } /* Web */
        .btn:nth-child(5)::before { background: linear-gradient(45deg, #25D366, #128C7E); } /* WhatsApp */

        .btn:hover {
            border-color: transparent;
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
        }

        .btn:hover::before {
            left: 0;
        }

        .btn i {
            font-size: 1.3rem;
        }

        /* --- FOOTER --- */
        footer {
            margin-top: 30px;
            font-size: 0.7rem;
            opacity: 0.7;
        }

        /* --- ANIMACIONES --- */
        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        /* Responsive para móviles */
        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            .container { padding: 30px 20px; width: 95%; }
        }
    </style>
</head>
